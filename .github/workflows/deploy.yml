name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy dist/ to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 95.216.168.28
          username: root
          key: ${{ secrets.VPS_DEPLOY_KEY }}
          source: dist/
          target: /var/www/kanji/
          strip_components: 1

      - name: Clean up Tatoeba proxy from Caddy if present
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: 95.216.168.28
          username: root
          key: ${{ secrets.VPS_DEPLOY_KEY }}
          script: |
            if grep -q "TATOEBA-PROXY" /etc/caddy/Caddyfile; then
              python3 - << 'PYEOF'
            import re
            content = open('/etc/caddy/Caddyfile').read()
            content = re.sub(
              r'\s*# TATOEBA-PROXY[^\n]*\n\s*handle /api/tatoeba[^{]*\{(?:[^{}]*\{[^{}]*\})*[^{}]*\}',
              '',
              content
            )
            open('/etc/caddy/Caddyfile', 'w').write(content)
            print("Tatoeba proxy removed from Caddyfile")
            PYEOF
              caddy validate --config /etc/caddy/Caddyfile && caddy reload --config /etc/caddy/Caddyfile
              echo "Caddy reloaded without Tatoeba proxy"
            fi
