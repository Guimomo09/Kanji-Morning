name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy dist/ to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 95.216.168.28
          username: root
          key: ${{ secrets.VPS_DEPLOY_KEY }}
          source: dist/
          target: /var/www/kanji/
          strip_components: 1
