name: Deploy

on:
  push:
    branches:
      - main
      - dev

jobs:
  deploy-staging:
    name: "Staging → kanji.guimo-prod.com"
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev'
    steps:
      - name: Deploy to staging via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/kanji-webhook
            git fetch origin
            git checkout dev
            git pull origin dev
            cp -r index.html public/* /var/www/kanji-staging/
            echo "STAGING DEPLOYED $(date)"

  deploy-prod:
    name: "Production → asanokanji.com"
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to production via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/kanji-webhook
            git fetch origin
            git checkout main
            git pull origin main
            cp -r index.html public/* /var/www/kanji/
            echo "PROD DEPLOYED $(date)"
