name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy dist/ to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 95.216.168.28
          username: root
          key: ${{ secrets.VPS_DEPLOY_KEY }}
          source: dist/
          target: /var/www/kanji/
          strip_components: 1

      - name: Ensure Tatoeba CORS proxy in Caddy (always up-to-date)
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: 95.216.168.28
          username: root
          key: ${{ secrets.VPS_DEPLOY_KEY }}
          script: |
            python3 - << 'PYEOF'
            import re
            content = open('/etc/caddy/Caddyfile').read()
            # Remove any existing proxy block (handles one level of nested braces inside it)
            content = re.sub(
              r'\s*# TATOEBA-PROXY[^\n]*\n\s*handle /api/tatoeba[^{]*\{(?:[^{}]*\{[^{}]*\})*[^{}]*\}',
              '',
              content
            )
            proxy = """
                # TATOEBA-PROXY
                handle /api/tatoeba* {
                    rewrite * /api_v0/search?{http.request.uri.query}
                    reverse_proxy https://tatoeba.org {
                        header_up Host tatoeba.org
                    }
                    header Access-Control-Allow-Origin *
                    header Cache-Control "public, max-age=3600"
                }"""
            # Insert at the very start of the kanji.guimo-prod.com site block
            content = re.sub(r'(kanji\.guimo-prod\.com[^{]*\{)', r'\1' + proxy, content, count=1)
            open('/etc/caddy/Caddyfile', 'w').write(content)
            print("Caddyfile updated OK")
            PYEOF
            caddy validate --config /etc/caddy/Caddyfile && caddy reload --config /etc/caddy/Caddyfile
            echo "Caddy proxy updated and reloaded"
