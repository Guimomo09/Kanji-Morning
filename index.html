<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>朝の漢字 · Morning Kanji</title>
  <!--
    Data source: kanjiapi.dev (free, open API, no auth required)
    /v1/kanji/jlpt-{4|3|2|1} → full list of kanji chars per JLPT level
    /v1/kanji/{char}          → meanings, on_readings, kun_readings
    /v1/words/{char}          → example words with readings and glosses
    All responses are cached in localStorage (24-hour TTL).
    Total pool: ~103 N5 + ~170 N4 + ~370 N3 + ~374 N2 + ~1136 N1 = ~2153 kanji
  -->

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#b71c1c" />
  <meta name="mobile-web-app-capable" content="yes" />
  <!-- iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="朝の漢字" />
  <link rel="apple-touch-icon" href="/icons/icon-192.svg" />

  <link rel="stylesheet" href="/src/styles.css" />

  <!-- Firebase SDKs (compat). Safe to remove these 3 lines if you don't want cloud sync. -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>
<body>

<header>
  <div>
    <div class="h-title" id="hTitle">朝の漢字</div>
    <div class="h-sub"   id="hSub">Morning Kanji · Daily Study</div>
  </div>
  <div id="authWrap" class="auth-wrap"></div>
  <div class="h-right">
    <div class="h-date"  id="hDate">?</div>
    <div class="h-greet" id="hGreet">?</div>
  </div>
</header>

<div class="tabbar">
  <button class="tab active" id="tabHome"   onclick="switchTab('home')">🏠<br><span style="font-size:9px;opacity:.7">Home</span></button>
  <button class="tab"        id="tabKanji"  onclick="switchTab('kanji')">漢字<br><span style="font-size:9px;opacity:.7">Kanji</span></button>
  <button class="tab"        id="tabVocab"  onclick="switchTab('vocab')">語彙<br><span style="font-size:9px;opacity:.7">Vocab</span></button>
  <button class="tab"        id="tabMyList" onclick="switchTab('mylist')">📋<br><span style="font-size:9px;opacity:.7">My List</span></button>
  <button class="tab"        id="tabStats"  onclick="switchTab('stats')">📊<br><span style="font-size:9px;opacity:.7">Stats</span></button>
</div>

<div class="toolbar" id="toolbarDiv">
  <button class="btn btn-primary" id="btnRefresh" onclick="refresh()">↺ New Selection</button>
  <button class="btn btn-quiz"  id="btnFromKanji"     onclick="toggleFromKanji()"     style="display:none">📖 From Kanji</button>
  <button class="btn btn-save"  id="btnSave"          onclick="saveToday()"           style="display:none">💾 Save for Quiz</button>
  <button class="btn btn-quiz"  id="btnDailyQuiz"     onclick="launchDailyQuiz()"     style="display:none">🎯 Daily Quiz</button>
  <button class="btn btn-quiz"  id="quizBtn"          onclick="toggleQuiz()"                              >🎯 Quiz Mode</button>
  <button class="btn btn-ghost" id="btnMore"          onclick="changeCount(1)"                            >＋ More</button>
  <button class="btn btn-ghost" id="btnLess"          onclick="changeCount(-1)"                           >－ Less</button>
  <button class="btn btn-quiz"  id="btnBiweeklyQuiz"  onclick="launchBiWeeklyQuiz()"  style="display:none">📅 Bi-Weekly Quiz</button>
  <button class="btn btn-review" id="btnReview"       onclick="launchSrsReview()"     style="display:none">⏱ Review<span class="review-count" id="reviewCount">0</span></button>
</div>
<div class="level-filter" id="levelFilter" style="display:none">
  <span class="level-filter-label">Level:</span>
  <button class="pill active" data-level="all" onclick="setLevel('all')">All</button>
  <button class="pill"        data-level="5"   onclick="setLevel('5')">N5</button>
  <button class="pill"        data-level="4"   onclick="setLevel('4')">N4</button>
  <button class="pill"        data-level="3"   onclick="setLevel('3')">N3</button>
  <button class="pill"        data-level="2"   onclick="setLevel('2')">N2</button>
  <button class="pill"        data-level="1"   onclick="setLevel('1')">N1</button>
  <span class="toolbar-info">Showing <strong id="countLabel">10</strong> <span id="tabLabel">vocabulary</span></span>
  <span id="statusMsg" class="status-loading">読み込み中…</span>
</div>

<div class="legend" id="legendDiv">
  <div class="legend-item"><span class="legend-dot" style="background:var(--n5)"></span>N5 (beginner)</div>
  <div class="legend-item"><span class="legend-dot" style="background:var(--n4)"></span>N4</div>
  <div class="legend-item"><span class="legend-dot" style="background:var(--n3)"></span>N3 (frequent)</div>
  <div class="legend-item"><span class="legend-dot" style="background:var(--n2)"></span>N2 (frequent)</div>
  <div class="legend-item"><span class="legend-dot" style="background:var(--n1)"></span>N1</div>
</div>

<div class="home-section"   id="homeSection"></div>
<div class="grid" id="grid" style="display:none"></div>
<div class="stats-section"  id="statsSection"  style="display:none"></div>
<div class="mylist-section" id="mylistSection" style="display:none"></div>

<footer>頑張って！Keep showing up — every morning counts.</footer>

<!-- Tutorial overlay (shown on first visit) -->
<div class="tutorial-overlay" id="tutorialOverlay" style="display:none">
  <div class="tutorial-card">
    <button class="tutorial-close" onclick="closeTutorial()">✕</button>
    <div class="tutorial-icon" id="tutIcon"></div>
    <div class="tutorial-title" id="tutTitle"></div>
    <div class="tutorial-body" id="tutBody"></div>
    <div class="tutorial-dots" id="tutDots"></div>
    <div class="tutorial-nav">
      <button class="btn btn-ghost" id="tutPrevBtn" onclick="tutorialPrev()" style="display:none">← Back</button>
      <button class="btn btn-primary" id="tutNextBtn" onclick="tutorialNext()">Next →</button>
    </div>
  </div>
</div>

<!-- Kanji detail popup -->
<div class="kanji-detail-backdrop" id="kanjiDetailBackdrop" style="display:none" onclick="closeKanjiDetail()">
  <div class="kanji-detail-modal" onclick="event.stopPropagation()">
    <button class="kanji-detail-close" onclick="closeKanjiDetail()">✕</button>
    <div id="kanjiDetailContent"><div class="kanji-detail-loading">Loading…</div></div>
  </div>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
